<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Logic Tutor</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="container">

        <!-- TÍTULO -->

        <h1>🧠 Logic Tutor</h1>

        <p class="subtitle">
            Aprende tablas de verdad paso a paso
        </p>



        <!-- IMAGEN -->

        <div class="instructions-image">

            <img
                src="conectivas.png"
                alt="Conectivas Lógicas">

        </div>



        <!-- ENTRADA -->

        <textarea
            id="formula"
            spellcheck="false"
            readonly
            placeholder="Ejemplo: ((p∨q)→¬r)">
        </textarea>



        <!-- BOTONES -->

        <div class="symbols">

            <!-- VARIABLES -->

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('p'); return false;">
                p
            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('q'); return false;">
                q
            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('r'); return false;">
                r
            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('s'); return false;">
                s
            </button>



            <!-- CONECTORES -->

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('∧'); return false;">
                ∧
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('∨'); return false;">
                ∨
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('¬'); return false;">
                ¬
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('→'); return false;">
                →
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('↔'); return false;">
                ↔
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol('('); return false;">
                (
            </button>

            <button
                type="button"
                class="symbolBtn connectorBtn"
                onclick="insertSymbol(')'); return false;">
                )
            </button>



            <!-- BORRAR -->

            <button
                type="button"
                class="symbolBtn deleteBtn"
                onclick="deleteLastSymbol(); return false;">
                ⌫
            </button>



            <!-- LIMPIAR -->

            <button
                type="button"
                class="symbolBtn clearBtn"
                onclick="clearFormula(); return false;">
                🗑
            </button>

        </div>



        <!-- ACCIONES -->

        <div class="buttons">

            <button
                type="button"
                onclick="startGuidedMode(); return false;">
                🧩 Resolver Conmigo
            </button>

            <button
                type="button"
                class="gameBtn"
                onclick="startOperatorGame(); return false;">
                🎯 Operador Principal
            </button>

        </div>



        <!-- PROGRESO -->

        <div
            class="progress"
            id="progress">
        </div>



        <!-- PREGUNTAS -->

        <div id="questionArea"></div>



        <!-- FEEDBACK -->

        <div id="feedback"></div>



        <!-- TABLA -->

        <div id="tableContainer"></div>

    </div>



    <!-- SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
