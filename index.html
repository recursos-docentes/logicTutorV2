<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Logic Tutor</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="container">

        <h1>🧠 Logic Tutor</h1>

        <p class="subtitle">
            Aprende tablas de verdad paso a paso
        </p>

        <!-- IMAGEN -->

        <div class="instructions-image">

            <img src="conectivas.png"
                alt="Conectivas Lógicas">

        </div>

        <!-- INPUT -->

        <textarea
            id="formula"
            spellcheck="false"
            placeholder="Ejemplo: ((p∨q)→¬r)">
        </textarea>

        <!-- BOTONES -->

        <div class="symbols">

            <!-- VARIABLES -->

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('p')">

                p

            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('q')">

                q

            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('r')">

                r

            </button>

            <button
                type="button"
                class="symbolBtn variableBtn"
                onclick="insertSymbol('s')">

                s

            </button>

            <!-- CONECTIVAS -->

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('∧')">

                ∧

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('∨')">

                ∨

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('¬')">

                ¬

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('→')">

                →

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('↔')">

                ↔

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol('(')">

                (

            </button>

            <button
                type="button"
                class="symbolBtn"
                onclick="insertSymbol(')')">

                )

            </button>

        </div>

        <!-- ACCIONES -->

        <div class="buttons">

            <button
                type="button"
                onclick="generateTruthTable()">

                📊 Generar Tabla

            </button>

            <button
                type="button"
                onclick="startGuidedMode()">

                🧩 Resolver Conmigo

            </button>

        </div>

        <!-- PROGRESO -->

        <div
            class="progress"
            id="progress">
        </div>

        <!-- PASOS -->

        <div id="steps"></div>

        <!-- PREGUNTAS -->

        <div id="questionArea"></div>

        <!-- FEEDBACK -->

        <div id="feedback"></div>

        <!-- TABLA -->

        <div id="tableContainer"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
