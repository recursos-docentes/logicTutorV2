<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Tutor</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>🧠 Logic Tutor</h1>

        <p class="subtitle">
            Aprende tablas de verdad paso a paso
        </p>

        <!-- CONECTIVAS -->

      <div class="instructions-image">

    <img src="conectivas.png" alt="Conectivas Lógicas">

</div>
        <!-- INPUT -->

        <textarea id="formula"></textarea>

        <!-- BOTONES DE CONECTIVAS -->

     <div class="symbols">

    <!-- VARIABLES -->

    <button class="symbolBtn variableBtn"
        onclick="insertSymbol('p')">
        p
    </button>

    <button class="symbolBtn variableBtn"
        onclick="insertSymbol('q')">
        q
    </button>

    <button class="symbolBtn variableBtn"
        onclick="insertSymbol('r')">
        r
    </button>

    <button class="symbolBtn variableBtn"
        onclick="insertSymbol('s')">
        s
    </button>

    <!-- CONECTIVAS -->

    <button class="symbolBtn"
        onclick="insertSymbol('∧')">
        ∧
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol('∨')">
        ∨
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol('¬')">
        ¬
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol('→')">
        →
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol('↔')">
        ↔
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol('(')">
        (
    </button>

    <button class="symbolBtn"
        onclick="insertSymbol(')')">
        )
    </button>

</div>

        <!-- ACCIONES -->

        <div class="buttons">

            <button onclick="generateTruthTable()">
                📊 Generar Tabla
            </button>

            <button onclick="startGuidedMode()">
                🧩 Resolver Conmigo
            </button>

        </div>

        <div class="progress" id="progress"></div>

        <div id="steps"></div>

        <div id="questionArea"></div>

        <div id="feedback"></div>

        <div id="tableContainer"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
